<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith App | YouVersion Style</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #007aff; --text: #fff; --grey: #8e8e93; --gold: #c5a059; --divider: #2c2c2e; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; padding: 20px; min-height: 100vh; padding-bottom: 100px; box-sizing: border-box; }
        .page.active { display: block; }

        /* Headers */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .header h1 { font-size: 1.8rem; margin: 0; font-weight: 800; }

        /* Bible Grid Style */
        .section-title { color: var(--grey); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 12px; font-weight: bold; }
        .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-book { background: var(--card); border: 1px solid var(--divider); border-radius: 10px; padding: 15px 5px; color: white; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-align: center; }
        .btn-book:active { background: #3a3a3c; }

        /* Chapter Picker Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .chap-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .btn-chap { background: var(--card); border: none; border-radius: 8px; padding: 15px 0; color: white; font-size: 1rem; font-weight: bold; }

        /* Reader View */
        .reader-text { font-size: 1.35rem; line-height: 1.9; color: #dfdfdf; margin-top: 20px; }
        .v-num { color: var(--gold); font-weight: bold; margin-right: 12px; font-size: 0.9rem; }
        .verse-row { margin-bottom: 15px; padding: 5px; border-radius: 5px; transition: 0.2s; }
        .verse-row:active { background: rgba(0, 122, 255, 0.2); }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; border-top: 1px solid var(--divider); padding: 10px 0 25px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--grey); font-size: 0.65rem; font-weight: 500; cursor: pointer; }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 1.4rem; margin-bottom: 4px; display: block; }

        /* Translation Pill */
        .pill { background: var(--divider); color: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header"><h1>Today</h1><div class="pill">⚡ 1</div></div>
        <div style="background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), url('https://images.unsplash.com/photo-1438232992991-995b7058bbb3?w=500'); background-size: cover; height: 220px; border-radius: 20px; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; box-sizing: border-box; border: 1px solid var(--divider);">
            <small style="color: var(--gold); font-weight: 800; letter-spacing: 1px;">VERSE OF THE DAY</small>
            <h2 style="margin: 8px 0; font-size: 1.2rem;">"I can do all things through Christ..."</h2>
            <button onclick="openBook('Philippians')" style="background:none; border:none; color:var(--accent); font-weight:bold; padding:0; text-align:left;">Read Philippians 4 ›</button>
        </div>
    </div>

    <div id="page-bible" class="page">
        <div class="header"><h1>Bible</h1><div class="pill" onclick="alert('Translation: KJV')">KJV ▾</div></div>
        <div class="section-title">Old Testament</div>
        <div class="book-grid" id="ot-list"></div>
        <div class="section-title">New Testament</div>
        <div class="book-grid" id="nt-list"></div>
    </div>

    <div id="picker-overlay" class="overlay">
        <div class="header">
            <button onclick="closeOverlay('picker-overlay')" style="background:none; border:none; color:var(--accent); font-size:1rem;">✕ Close</button>
            <h2 id="picker-title" style="margin:0;">Book</h2>
            <div></div>
        </div>
        <div class="chap-grid" id="chap-list"></div>
    </div>

    <div id="reader-overlay" class="overlay">
        <div class="header" style="position: sticky; top:0; background: var(--bg); padding-bottom:10px;">
            <button onclick="closeOverlay('reader-overlay')" style="background:none; border:none; color:var(--accent); font-size:1rem;">← Bible</button>
            <b id="reader-title">Genesis 1</b>
            <div class="pill">KJV</div>
        </div>
        <div id="reader-content" class="reader-text"></div>
        <button id="btn-next" style="width:100%; padding:20px; background:white; color:black; border-radius:15px; font-weight:bold; border:none; margin: 40px 0;">Next Chapter</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home', this)"><span class="nav-icon">🏠</span>Home</div>
        <div class="nav-item" onclick="nav('bible', this)"><span class="nav-icon">📖</span>Bible</div>
        <div class="nav-item" onclick="nav('bible', this)"><span class="nav-icon">🔍</span>Discover</div>
        <div class="nav-item" onclick="nav('home', this)"><span class="nav-icon">👤</span>You</div>
    </div>

    <script>
        const ot = ["Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy", "Joshua", "Judges", "Ruth", "1 Samuel", "2 Samuel", "1 Kings", "2 Kings", "1 Chronicles", "2 Chronicles", "Ezra", "Nehemiah", "Esther", "Job", "Psalms", "Proverbs", "Ecclesiastes", "Song of Solomon", "Isaiah", "Jeremiah", "Lamentations", "Ezekiel", "Daniel", "Hosea", "Joel", "Amos", "Obadiah", "Jonah", "Micah", "Nahum", "Habakkuk", "Zephaniah", "Haggai", "Zechariah", "Malachi"];
        const nt = ["Matthew", "Mark", "Luke", "John", "Acts", "Romans", "1 Cor", "2 Cor", "Galatians", "Ephesians", "Philippians", "Colossians", "1 Thess", "2 Thess", "1 Tim", "2 Tim", "Titus", "Philemon", "Hebrews", "James", "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude", "Revelation"];

        function init() {
            const otDiv = document.getElementById('ot-list');
            const ntDiv = document.getElementById('nt-list');
            ot.forEach(b => otDiv.innerHTML += `<div class="btn-book" onclick="openBook('${b}')">${b}</div>`);
            nt.forEach(b => ntDiv.innerHTML += `<div class="btn-book" onclick="openBook('${b}')">${b}</div>`);
        }

        function openBook(book) {
            document.getElementById('picker-title').innerText = book;
            const chapDiv = document.getElementById('chap-list');
            chapDiv.innerHTML = "";
            // Simulating chapter counts (normally fetched from an API/Data list)
            let count = book === "Psalms" ? 150 : 28; 
            for(let i=1; i<=count; i++) {
                chapDiv.innerHTML += `<button class="btn-chap" onclick="loadScripture('${book}', ${i})">${i}</button>`;
            }
            document.getElementById('picker-overlay').style.display = 'block';
        }

        async function loadScripture(book, chap) {
            document.getElementById('picker-overlay').style.display = 'none';
            document.getElementById('reader-overlay').style.display = 'block';
            const content = document.getElementById('reader-content');
            document.getElementById('reader-title').innerText = `${book} ${chap}`;
            content.innerHTML = `<p style="color:var(--grey)">Loading the Word...</p>`;

            try {
                const res = await fetch(`https://bible-api.com/${book}+${chap}`);
                const data = await res.json();
                let html = "";
                data.verses.forEach(v => {
                    html += `<div class="verse-row"><span class="v-num">${v.verse}</span>${v.text}</div>`;
                });
                content.innerHTML = html;
                document.getElementById('btn-next').onclick = () => loadScripture(book, chap + 1);
            } catch(e) {
                content.innerHTML = "Error loading. Please check your connection.";
            }
        }

        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

        function nav(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
