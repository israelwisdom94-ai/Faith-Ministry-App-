<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Evangelical Ministry</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #007aff; --text: #fff; --grey: #8e8e93; --gold: #c5a059; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .page { display: none; padding: 20px; min-height: 100vh; padding-bottom: 100px; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Components */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; font-weight: 800; font-size: 1.5rem; }
        .search-box { background: var(--card); padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* Discovery & Tags */
        .tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tag-card { border-radius: 12px; height: 110px; padding: 15px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; border: none; }

        /* Bible Grid */
        .bible-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .book-btn { background: var(--card); padding: 15px 5px; text-align: center; border-radius: 10px; color: #fff; border: 1px solid #2c2c2e; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        /* Reader Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .reader-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; position: sticky; top:0; background: var(--bg); }
        .reading-text { font-size: 1.25rem; line-height: 1.8; color: #ddd; margin-top: 25px; }
        .verse-num { color: var(--gold); font-weight: bold; margin-right: 10px; }
        
        /* Interactive Verse Link */
        .verse-link { color: var(--accent); font-weight: bold; text-decoration: underline; cursor: pointer; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2c2c2e; z-index: 1000; }
        .tab { text-align: center; color: var(--grey); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .tab.active { color: #fff; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="top-nav">Daily Inspiration</div>
        <div style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1490730141103-6ac277a59f48?w=500'); background-size: cover; border-radius: 15px; padding: 25px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; text-align: center;">
            <p id="daily-quote" style="font-size: 1.2rem; font-style: italic; margin-bottom: 15px;">"For God so loved the world..."</p>
            <button class="verse-link" onclick="readBible('John', 3)" style="background:none; border:none; font-size:1rem;">Read John 3 ›</button>
        </div>
        <h4 style="margin: 30px 0 10px; color: var(--grey); font-size: 0.7rem; text-transform: uppercase;">Discover Topics</h4>
        <div class="tag-grid">
            <div class="tag-card" style="background: #1a5e7a;" onclick="openTopic('Love', '1 Corinthians', 13)">Love</div>
            <div class="tag-card" style="background: #5d4037;" onclick="openTopic('Healing', 'Psalm', 103)">Healing</div>
        </div>
    </div>

    <div id="bible" class="page">
        <div class="top-nav">Bible</div>
        <div class="search-box"><span>🔍</span><input type="text" placeholder="Search Book..."></div>
        <div id="bible-list">
            <div class="bible-grid" id="ot-grid"></div>
            <div style="margin: 20px 0;"></div>
            <div class="bible-grid" id="nt-grid"></div>
        </div>
    </div>

    <div id="discover" class="page">
        <div class="top-nav">Plans</div>
        <div class="search-box"><span>🔍</span><input type="text" placeholder="Search thousands of plans..."></div>
        <div class="tag-grid">
            <div class="tag-card" style="background: #388e3c;" onclick="openTopic('Faith', 'Hebrews', 11)">Faith</div>
            <div class="tag-card" style="background: #e64a19;" onclick="openTopic('Wisdom', 'Proverbs', 1)">Wisdom</div>
        </div>
    </div>

    <div id="reader-overlay" class="overlay">
        <div class="reader-header">
            <button onclick="closeOverlay()" style="background:none; border:none; color:var(--accent); font-size:1rem; cursor:pointer;">← Back</button>
            <b id="reader-title">Reading</b>
            <span style="color:var(--gold); font-weight:bold; font-size:0.8rem;">KJV</span>
        </div>
        <div id="reader-body" class="reading-text"></div>
        <button id="next-btn" style="width:100%; padding:15px; border-radius:12px; background:white; color:black; font-weight:bold; border:none; margin-top:20px; display:none;">Next Chapter</button>
    </div>

    <div class="bottom-bar">
        <div class="tab active" onclick="nav('home', this)">🏠<br>Home</div>
        <div id="bible-tab" class="tab" onclick="nav('bible', this)">📖<br>Bible</div>
        <div class="tab" onclick="nav('discover', this)">✅<br>Plans</div>
    </div>

    <script>
        const ot = ["Genesis", "Exodus", "Psalms", "Proverbs", "Isaiah"];
        const nt = ["Matthew", "Mark", "Luke", "John", "Acts", "Romans", "Hebrews", "Revelation"];

        function init() {
            const otG = document.getElementById('ot-grid');
            const ntG = document.getElementById('nt-grid');
            ot.forEach(b => otG.innerHTML += `<button class="book-btn" onclick="readBible('${b}', 1)">${b}</button>`);
            nt.forEach(b => ntG.innerHTML += `<button class="book-btn" onclick="readBible('${b}', 1)">${b}</button>`);
        }
        init();

        async function readBible(book, chap) {
            nav('bible', document.getElementById('bible-tab')); // Switch tab visually
            const body = document.getElementById('reader-body');
            const next = document.getElementById('next-btn');
            document.getElementById('reader-title').innerText = `${book} ${chap}`;
            body.innerHTML = "Fetching Scripture...";
            document.getElementById('reader-overlay').style.display = 'block';
            
            try {
                const res = await fetch(`https://bible-api.com/${book}+${chap}`);
                const data = await res.json();
                let html = "";
                data.verses.forEach(v => html += `<p><span class="verse-num">${v.verse}</span>${v.text}</p>`);
                body.innerHTML = html;
                next.style.display = 'block';
                next.onclick = () => readBible(book, chap + 1);
            } catch (e) {
                body.innerHTML = "End of book or Error.";
            }
        }

        function openTopic(topic, book, chap) {
            document.getElementById('reader-title').innerText = topic;
            document.getElementById('reader-body').innerHTML = `
                <h2 style="color:var(--gold);">Topic: ${topic}</h2>
                <p>Exploring ${topic} helps us understand God's heart. This theme is central to the Christian walk.</p>
                <p><b>Study Verse:</b> <span class="verse-link" onclick="readBible('${book}', ${chap})">${book} ${chap} ›</span></p>
                <p>Click the link above to read the full context in the Bible.</p>
            `;
            document.getElementById('reader-overlay').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
        }

        function closeOverlay() { document.getElementById('reader-overlay').style.display = 'none'; }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
