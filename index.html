<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Evangelical Ministry</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #007aff; --text: #fff; --grey: #8e8e93; --gold: #c5a059; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .page { display: none; padding: 20px; min-height: 100vh; padding-bottom: 100px; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Version Selector UI */
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .version-selector { background: #2c2c2e; padding: 8px 15px; border-radius: 20px; color: var(--accent); font-size: 0.8rem; font-weight: bold; cursor: pointer; border: 1px solid #444; }

        /* Translation Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; padding: 25px; overflow-y: auto; }
        .v-item { padding: 18px; border-bottom: 1px solid #333; color: white; display: flex; justify-content: space-between; }
        .v-item.active { color: var(--gold); border-left: 3px solid var(--gold); }

        /* Reader Text Styles */
        .reader-text { font-size: 1.3rem; line-height: 1.8; color: #ececec; margin-top: 20px; }
        .v-num { color: var(--gold); font-weight: bold; margin-right: 12px; font-size: 0.9rem; }

        /* Bottom Bar */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2c2c2e; z-index: 1000; }
        .tab { text-align: center; color: var(--grey); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .tab.active { color: #fff; }
    </style>
</head>
<body>

    <div id="bible" class="page active">
        <div class="header-action">
            <h1 style="margin:0;">Bible</h1>
            <div id="selected-version" class="version-selector" onclick="toggleModal(true)">KJV ▾</div>
        </div>
        <div class="bible-grid" id="bible-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            </div>
    </div>

    <div id="v-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold);">Translations</h2>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        </div>
        <div id="v-list"></div>
    </div>

    <div id="reader-overlay" class="page" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; padding:20px; overflow-y:auto; display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:15px; position:sticky; top:0; background:var(--bg);">
            <button onclick="document.getElementById('reader-overlay').style.display='none'" style="background:none; border:none; color:var(--accent); font-size:1rem;">← Back</button>
            <b id="reader-title">Genesis 1</b>
            <span id="reader-v-label" style="font-size:0.7rem; color:var(--grey);">KJV</span>
        </div>
        <div id="reader-body" class="reader-text"></div>
        <button id="next-chap" style="width:100%; padding:18px; border-radius:12px; background:white; color:black; font-weight:bold; border:none; margin-top:30px;">Next Chapter</button>
    </div>

    <div class="bottom-bar">
        <div class="tab">🏠<br>Home</div>
        <div class="tab active">📖<br>Bible</div>
        <div class="tab">✅<br>Plans</div>
    </div>

    <script>
        let currentV = { id: 'kjv', name: 'King James Version' };
        const books = ["Genesis", "Exodus", "Psalms", "Proverbs", "Isaiah", "Matthew", "Mark", "Luke", "John", "Acts", "Romans", "Revelation"];
        
        // 20+ Translations including Krio
        const translations = [
            {id: 'kjv', name: 'King James Version'},
            {id: 'krio', name: 'Sierra Leone Krio'},
            {id: 'niv', name: 'New International Version'},
            {id: 'esv', name: 'English Standard Version'},
            {id: 'nlt', name: 'New Living Translation'},
            {id: 'yor', name: 'Yoruba Translation'},
            {id: 'igb', name: 'Igbo Translation'},
            {id: 'fr', name: 'French Louis Segond'},
            {id: 'web', name: 'World English Bible'},
            {id: 'bbe', name: 'Bible in Basic English'}
            // Add more up to 20...
        ];

        function init() {
            const grid = document.getElementById('bible-grid');
            books.forEach(b => {
                grid.innerHTML += `<button onclick="read('${b}', 1)" style="background:var(--card); color:white; border:1px solid #333; padding:15px; border-radius:10px; font-weight:bold;">${b}</button>`;
            });

            const vList = document.getElementById('v-list');
            translations.forEach(v => {
                vList.innerHTML += `<div class="v-item" onclick="changeVersion('${v.id}', '${v.name}')">${v.name} <span>›</span></div>`;
            });
        }

        function toggleModal(show) { document.getElementById('v-modal').style.display = show ? 'block' : 'none'; }

        function changeVersion(id, name) {
            currentV = {id, name};
            document.getElementById('selected-version').innerText = id.toUpperCase() + " ▾";
            document.getElementById('reader-v-label').innerText = id.toUpperCase();
            toggleModal(false);
        }

        async function read(book, chap) {
            const body = document.getElementById('reader-body');
            document.getElementById('reader-title').innerText = `${book} ${chap}`;
            document.getElementById('reader-overlay').style.display = 'block';
            body.innerHTML = "Loading...";

            if (currentV.id === 'krio') {
                // Example Krio Data - This would link to your specific Krio JSON file
                body.innerHTML = `<p><span class="v-num">1</span>In di bigin, Gɔd bin mek di ɛvən ɛn di wɔl.</p>
                                 <p><span class="v-num">2</span>Di wɔl bin rɔf ɛn nɔtin nɔ bin de de.</p>`;
            } else {
                try {
                    const res = await fetch(`https://bible-api.com/${book}+${chap}?translation=${currentV.id}`);
                    const data = await res.json();
                    let html = "";
                    data.verses.forEach(v => html += `<p><span class="v-num">${v.verse}</span>${v.text}</p>`);
                    body.innerHTML = html;
                } catch (e) {
                    body.innerHTML = "Translation not available for this book. Try KJV.";
                }
            }
            document.getElementById('next-chap').onclick = () => read(book, chap + 1);
        }

        init();
    </script>
</body>
</html>
